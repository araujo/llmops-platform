[project]
name = "shopping-assistant"
version = "0.1.0"
description = "Shopping assistant agent (self-contained plugin package)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langchain-anthropic>=0.3.0",
    "langchain-ollama>=0.3.0",
    "langgraph>=0.2.0",
    "langchain-openai>=0.3.0",
    "llmops-core",
]

[project.scripts]
shopping-assistant-catalog = "shopping_assistant.cli.catalog:main"
shopping-assistant-seed-prompts = "shopping_assistant.bootstrap.cli:main"

[project.entry-points."llmops.agent_plugins"]
shopping_assistant = "shopping_assistant.plugin:register"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shopping_assistant"]

[tool.hatch.build.targets.wheel.force-include]
"shopping_assistant/prompts/documents" = "shopping_assistant/prompts/documents"
"shopping_assistant/data" = "shopping_assistant/data"
"shopping_assistant/evals/datasets" = "shopping_assistant/evals/datasets"

[tool.uv.sources]
llmops-core = { workspace = true }
