[project]
name = "catalog"
version = "0.1.0"
description = "Sample product catalog ETL (normalize and enrich raw rows)"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["catalog"]

[tool.hatch.build.targets.wheel.force-include]
"catalog/fixtures/sample.json" = "catalog/fixtures/sample.json"
