[project]
name = "llmops-core"
version = "0.1.0"
description = "Plugin contract, registry, and host-side utilities (agent-agnostic)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "langchain-core>=0.3.0",
    "langfuse>=2.0.0",
    "pgvector>=0.3.0",
    "psycopg[binary]>=3.1.0",
    "psycopg-pool>=3.2.0",
    "pymongo>=4.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llmops_core"]
